name: Lint and Format

on:
  push:
    branches:
      - main
      - master
      - staging
  pull_request:
    branches:
      - main
      - master
      - staging

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: npm run lint

      - name: Run Prettier check
        id: prettier
        continue-on-error: true
        run: npm run format:check

      - name: Add lint/format annotations
        if: ${{ steps.eslint.outcome == 'failure' || steps.prettier.outcome == 'failure' }}
        run: |
          if [ "${{ steps.eslint.outcome }}" = "failure" ]; then
            echo "::error title=ESLint check failed::Lint issues were found. Run 'npm run lint:fix' locally to auto-fix."
          fi
          if [ "${{ steps.prettier.outcome }}" = "failure" ]; then
            echo "::error title=Prettier check failed::Formatting issues were found. Run 'npm run format' locally to auto-fix."
          fi

      - name: Add step summary
        if: always()
        run: |
          {
            echo "## Lint and Format Results"
            if [ "${{ steps.eslint.outcome }}" = "success" ]; then
              echo "- ✅ ESLint passed"
            else
              echo "- ❌ ESLint failed (suggested fix: \`npm run lint:fix\`)"
            fi
            if [ "${{ steps.prettier.outcome }}" = "success" ]; then
              echo "- ✅ Prettier check passed"
            else
              echo "- ❌ Prettier check failed (suggested fix: \`npm run format\`)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if lint or format checks failed
        if: ${{ steps.eslint.outcome == 'failure' || steps.prettier.outcome == 'failure' }}
        run: exit 1
