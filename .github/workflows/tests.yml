name: Tests

on:
  push:
    branches:
      - main
      - master
      - staging
  pull_request:
    branches:
      - main
      - master
      - staging

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/test_db' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: run_tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee test-output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$TEST_EXIT_CODE" -ne 0 ]; then
            echo "::error title=Test suite failed::One or more tests failed. Run 'npm test' locally to reproduce."
            while IFS= read -r line; do
              escaped_line=$(printf '%s' "$line" | sed -e 's/%/%25/g' -e 's/\r/%0D/g' -e 's/\n/%0A/g')
              echo "::error title=Test failure::$escaped_line"
            done < <(grep -E "FAIL |● " test-output.log || true)
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: warn
          retention-days: 30

      - name: Generate test and coverage summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Test Results"
            if [ "${{ steps.run_tests.outputs.exit_code }}" = "0" ]; then
              echo "- ✅ All tests passed"
            else
              echo "- ❌ Test failures detected"
            fi
            echo ""
            echo "## Coverage Status"
            if [ -f coverage/coverage-summary.json ]; then
              node -e "const fs=require('fs');const summary=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')).total;console.log('- Lines: '+summary.lines.pct+'%');console.log('- Statements: '+summary.statements.pct+'%');console.log('- Functions: '+summary.functions.pct+'%');console.log('- Branches: '+summary.branches.pct+'%');"
            else
              echo "- ⚠️ Coverage summary was not found at coverage/coverage-summary.json"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if tests failed
        if: ${{ steps.run_tests.outputs.exit_code != '0' }}
        run: exit 1
